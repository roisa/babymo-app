<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(60,181,74,0.2);-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a20;font-family:'Nunito',sans-serif;}

/* ===== CSS VARIABLES — BabyMo Brand ===== */
:root{
  --green:#3CB54A;--green-dark:#2a8435;--green-glow:#5dd96e;
  --orange:#FF8C42;--yellow:#FFD23F;--red:#E8401C;
  --white:#FFFFFF;--cream:#FFF8EC;--dark:#0d2018;
  --shadow:rgba(0,0,0,0.35);
  --ui-bg:rgba(255,255,255,0.97);
  --card-bg:#f0faf2;
}

/* ===== PARTICLE CANVAS ===== */
#cvs{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* ===== SCREEN SYSTEM ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s ease,transform .4s ease;z-index:10;}
.screen.off{opacity:0;pointer-events:none;transform:scale(0.95);}

/* ===== ADVENTURE MAP (HOME + LEVEL SELECT) ===== */
#s-home{
  background:radial-gradient(ellipse at 50% 15%, #1e5a2e 0%, #0d2018 70%);
  padding:0;justify-content:flex-start;overflow:hidden;
}
.map-header{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:calc(env(safe-area-inset-top) + 14px) 20px 8px;flex-shrink:0;
  z-index:5;
}
.map-title{font-family:'Fredoka One',cursive;font-size:24px;color:#FFD23F;text-align:center;text-shadow:0 2px 14px rgba(255,210,63,.35);}
.map-scroll{flex:1;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 20px 16px;}
.map-footer{
  width:100%;flex-shrink:0;display:flex;justify-content:center;
  padding:10px 20px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(13,32,24,.85) 0%,transparent 100%);
  z-index:5;
}
.map-hub-btn{
  font-family:'Fredoka One',cursive;font-size:15px;color:#fff;text-decoration:none;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:40px;padding:12px 32px;
  transition:all .15s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.map-hub-btn:active{transform:scale(.95);background:rgba(255,255,255,.15);}
.map-path{display:flex;flex-direction:column;align-items:center;position:relative;}
.map-node{
  display:flex;align-items:center;gap:14px;width:100%;max-width:360px;
  padding:16px 18px;background:rgba(255,255,255,.06);
  border:2px solid rgba(60,181,74,.2);border-radius:22px;
  cursor:pointer;transition:all .18s;position:relative;z-index:2;
}
.map-node:active{transform:scale(.96);}
.map-node.locked{opacity:.3;cursor:not-allowed;border-color:rgba(255,255,255,.08);}
.map-node.locked:active{transform:none;}
.map-node.current{
  border-color:#FFD23F;background:rgba(255,215,63,.08);
  box-shadow:0 0 24px rgba(255,215,63,.18),0 4px 16px rgba(0,0,0,.2);
  animation:nodePulse 2.5s ease-in-out infinite;
}
@keyframes nodePulse{0%,100%{box-shadow:0 0 20px rgba(255,215,63,.15),0 4px 16px rgba(0,0,0,.2)}50%{box-shadow:0 0 32px rgba(255,215,63,.35),0 0 0 6px rgba(255,215,63,.06),0 4px 16px rgba(0,0,0,.2)}}
.map-node.done{border-color:rgba(60,181,74,.4);background:rgba(60,181,74,.06);}
.node-icon{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,rgba(60,181,74,.22),rgba(60,181,74,.08));
  display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;
}
.map-node.current .node-icon{background:linear-gradient(135deg,rgba(255,215,63,.2),rgba(255,215,63,.08));}
.node-info{flex:1;min-width:0;}
.node-name{font-family:'Fredoka One',cursive;font-size:16px;color:#fff;margin-bottom:2px;}
.node-desc{font-size:10.5px;color:rgba(255,255,255,.45);font-weight:700;margin-bottom:4px;}
.node-stars span{font-size:15px;}
.sf{color:var(--yellow)}.se{color:rgba(255,255,255,.15)}
.node-badge{font-family:'Fredoka One',cursive;font-size:12px;flex-shrink:0;border-radius:20px;padding:5px 12px;}
.node-badge.play{color:#0d2018;background:linear-gradient(135deg,#FFD23F,#f5b800);box-shadow:0 3px 0 #c49500,0 4px 12px rgba(255,210,63,.35);animation:badgeGlow 2s ease-in-out infinite;}
@keyframes badgeGlow{0%,100%{box-shadow:0 3px 0 #c49500,0 4px 12px rgba(255,210,63,.3)}50%{box-shadow:0 3px 0 #c49500,0 4px 18px rgba(255,210,63,.55)}}
.node-badge.done-chk{color:rgba(60,181,74,.8);font-size:20px;}
.map-conn{width:3px;height:24px;position:relative;z-index:1;margin:0 auto;}
.map-conn-line{width:3px;height:100%;margin:0 auto;background:repeating-linear-gradient(to bottom,rgba(60,181,74,.35) 0px,rgba(60,181,74,.35) 5px,transparent 5px,transparent 10px);}
.map-node.locked+.map-conn .map-conn-line,.map-conn:has(+.map-node.locked) .map-conn-line{background:repeating-linear-gradient(to bottom,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 5px,transparent 5px,transparent 10px);}
.map-dstar{position:absolute;pointer-events:none;color:#FFD23F;text-shadow:0 0 8px #FFD23F;animation:dstarA var(--d) ease-in-out infinite var(--dl);}
@keyframes dstarA{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.85;transform:scale(1.2)}}
.map-moon{position:absolute;top:8%;right:8%;font-size:36px;animation:moonF 7s ease-in-out infinite;opacity:.35;pointer-events:none;z-index:1;}
@keyframes moonF{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-14px) rotate(8deg)}}

/* ===== GAME SCREEN ===== */
#s-game{background:var(--dark);justify-content:flex-start;padding:0;}

.g-header{
  width:100%;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  background:var(--green);
  box-shadow:0 3px 0 var(--green-dark);
}
.g-title{font-family:'Fredoka One',cursive;font-size:15px;color:#fff;flex:1;text-align:center;text-shadow:0 1px 0 rgba(0,0,0,0.2);}
.g-dots{display:flex;gap:5px;}
.gd{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all .3s;}
.gd.hit{background:#FFD23F;transform:scale(1.4);box-shadow:0 0 8px #FFD23F;}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#fff;flex-shrink:0;transition:transform .12s;}
.back-btn:active{transform:scale(0.88);}
.hint-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,215,63,0.25);border:2px solid rgba(255,215,63,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;transition:transform .12s;}
.hint-btn:active{transform:scale(0.88);}

/* ===== SCENE ===== */
.scene-wrap{flex:1;width:100%;position:relative;overflow:hidden;cursor:pointer;}
.scene-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* ===== TAP TARGETS (HTML — iOS safe) ===== */
.obj-bubble{
  position:absolute;transform:translate(-50%,-50%);
  width:76px;height:76px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  background:rgba(255,255,255,0.18);
  border:2.5px solid rgba(255,255,255,0.25);
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
  cursor:pointer;
  /* Critical for iOS touch */
  touch-action:none;
  -webkit-tap-highlight-color:rgba(255,215,63,0.35);
  animation:bubbleFloat var(--bf-dur,3s) ease-in-out infinite var(--bf-del,0s);
  transition:transform .15s;
  z-index:20;
}
@keyframes bubbleFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-7px)}}
.obj-bubble.hint{animation:hintGlow 1.4s ease-in-out infinite !important;}
@keyframes hintGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,215,63,0);border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.18)}50%{box-shadow:0 0 0 12px rgba(255,215,63,0.15),0 0 30px rgba(255,215,63,0.5);border-color:#FFD23F;background:rgba(255,215,78,0.3)}}
.obj-bubble.found-anim{animation:objFnd .55s ease forwards !important;}
@keyframes objFnd{0%{transform:translate(-50%,-50%) scale(1);opacity:1}40%{transform:translate(-50%,-50%) scale(1.6);opacity:1}100%{transform:translate(-50%,-50%) scale(0);opacity:0}}

/* Wrong tap scene background */
.scene-bg-tap{position:absolute;inset:0;z-index:5;}

/* ===== EFFECTS ===== */
.fx-wrap{position:absolute;inset:0;pointer-events:none;z-index:30;}
.sp{position:absolute;border-radius:50%;animation:spA .9s ease-out forwards;}
@keyframes spA{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) translate(-50%,-50%) scale(0);opacity:0}}
.found-txt{position:absolute;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:22px;color:#FFD23F;text-shadow:0 0 12px rgba(255,210,63,.7);white-space:nowrap;pointer-events:none;z-index:40;animation:ftA 1.5s ease-out forwards;}
@keyframes ftA{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}20%{transform:translate(-50%,-90%) scale(1.25);opacity:1}70%{transform:translate(-50%,-140%) scale(1);opacity:1}100%{transform:translate(-50%,-190%) scale(.8);opacity:0}}
.wrong-sp{position:absolute;transform:translate(-50%,-50%);font-size:20px;pointer-events:none;z-index:35;animation:wsA .7s ease-out forwards;}
@keyframes wsA{0%{transform:translate(-50%,-50%);opacity:1}100%{transform:translate(-50%,-150%);opacity:0}}
.baby-react{position:absolute;top:50%;left:50%;font-size:80px;pointer-events:none;z-index:50;animation:brA 1s ease forwards;}
@keyframes brA{0%{transform:translate(-50%,-50%) scale(0)}30%{transform:translate(-50%,-50%) scale(1.4)}65%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}

/* ===== TRAY ===== */
.tray{
  width:100%;padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:#fff;border-top:3px solid var(--green);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  box-shadow:0 -4px 16px rgba(0,0,0,0.1);
}
.bmo-face{width:52px;height:52px;border-radius:50%;border:3px solid var(--green);overflow:hidden;flex-shrink:0;background:#e8f8eb;}
.bmo-face img{width:100%;height:100%;object-fit:cover;object-position:50% 8%;}
.bmo-face.happy{animation:bmoH .5s ease;border-color:var(--yellow);}
@keyframes bmoH{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.tray-items{display:flex;gap:7px;flex:1;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.tray-items::-webkit-scrollbar{display:none;}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;width:52px;padding:5px 3px;background:var(--card-bg);border-radius:14px;border:2.5px solid rgba(60,181,74,0.2);transition:all .3s;}
.ti.found{background:#f5f5f5;border-color:#ddd;opacity:.5;}
.ti.found .ti-icon{filter:grayscale(1);}
.ti-icon{font-size:24px;}
.ti-lbl{font-size:8px;color:#4a7a54;font-weight:900;text-align:center;line-height:1.2;text-transform:uppercase;letter-spacing:.3px;}

/* ===== COMPLETE SCREEN ===== */
#s-complete{
  background:radial-gradient(ellipse at 50% 25%,#1e5a2e 0%,#0d2018 65%);
  gap:13px;
  padding-bottom:env(safe-area-inset-bottom);
}
.comp-baby{width:160px;animation:cbA 1.1s ease-in-out infinite;filter:drop-shadow(0 10px 28px rgba(0,0,0,.5));}
@keyframes cbA{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-18px) rotate(3deg)}}
.comp-title{font-family:'Fredoka One',cursive;font-size:28px;color:#FFD23F;text-align:center;text-shadow:0 0 28px rgba(255,210,63,.5);animation:titleP .5s cubic-bezier(.175,.885,.32,1.275);line-height:1.4;}
@keyframes titleP{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
.comp-stars{display:flex;gap:10px;}
.cstar{font-size:40px;animation:csA .55s cubic-bezier(.175,.885,.32,1.275) both;}
.cstar:nth-child(1){animation-delay:.25s}.cstar:nth-child(2){animation-delay:.42s}.cstar:nth-child(3){animation-delay:.58s}
@keyframes csA{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.sticker{width:118px;height:118px;background:linear-gradient(135deg,rgba(60,181,74,.2),rgba(255,140,66,.2));border:3px solid #FFD23F;border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:60px;animation:stkA .7s cubic-bezier(.175,.885,.32,1.275) .35s both;box-shadow:0 0 36px rgba(255,210,63,.28);}
@keyframes stkA{0%{transform:rotate(-15deg) scale(0);opacity:0}100%{transform:rotate(0) scale(1);opacity:1}}
.comp-msg{font-size:13px;color:rgba(255,248,231,.65);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;text-align:center;}
.act-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.abtn{padding:14px 36px;border-radius:60px;border:none;font-family:'Fredoka One',cursive;font-size:21px;cursor:pointer;transition:transform .12s,box-shadow .12s;}
.abtn-main{background:linear-gradient(160deg,#3CB54A,#2a8435);color:#fff;box-shadow:0 6px 0 #1e5c26,0 8px 22px rgba(60,181,74,.38);}
.abtn-main:active{transform:translateY(6px);box-shadow:0 0px 0 #1e5c26,0 3px 10px rgba(60,181,74,.2);}
.abtn-sec{background:rgba(255,255,255,.12);color:var(--cream);border:2px solid rgba(255,255,255,.2);}
.abtn-sec:active{transform:scale(.95);}

/* tablet/iPad — widen the play area */
@media(min-width:820px){.map-node{max-width:680px!important;}}

/* bm-letterbox: comfortable centered column on tablet/desktop */
@media(min-width:760px){.screen{max-width:560px!important;margin-left:auto!important;margin-right:auto!important;left:0!important;right:0!important;}}body{background:#06100A;}}
</style>

<canvas id="cvs"></canvas>

<div class="screen" id="s-home">
  <div class="map-moon">🌙</div>
  <span class="map-dstar" style="top:14%;left:8%;font-size:12px;--d:3.2s;--dl:0s">✦</span>

<!-- ======= GAME ======= -->
<div class="screen off" id="s-game">

    <button class="back-btn" id="game-back">←</button>
    <span class="g-title" id="g-title">—</span>

// =============================================
// AUDIO
// =============================================
let ac=null;
function ga(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function chime(ns=[523,659,784],d=0.13){
  try{const c=ga();ns.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';const t=c.currentTime+i*d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+d*2.4);o.start(t);o.stop(t+d*2.4);});}catch(e){}
}
function sfx(f=900,v=0.06,d=0.1){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function completeSnd(){chime([523,659,784,1047,1318],0.17);}
document.addEventListener('touchstart',()=>{try{ga().resume();}catch(e){}},{once:true,passive:true});
document.addEventListener('click',()=>{try{ga().resume();}catch(e){}},{once:true});

// =============================================
// PARTICLES
// =============================================
const cv=document.getElementById('cvs'),c2=cv.getContext('2d');
let pts=[];
function rCv(){cv.width=innerWidth;cv.height=innerHeight;}
function mkPt(){return{x:Math.random()*cv.width,y:Math.random()*cv.height,s:Math.random()*2+0.5,vy:-(Math.random()*.25+.07),op:Math.random()*.5+.15,ts:Math.random()*.016+.004,tp:Math.random()*Math.PI*2,col:Math.random()>.35?'#fffde0':'#FFD23F'};}
function animPts(){
  c2.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{
    p.tp+=p.ts;const op=p.op*(0.4+0.6*Math.sin(p.tp));
    c2.beginPath();c2.arc(p.x,p.y,p.s,0,Math.PI*2);c2.fillStyle=p.col;c2.globalAlpha=op;c2.fill();
    if(p.s>1.3){const gr=c2.createRadialGradient(p.x,p.y,0,p.x,p.y,p.s*3.5);gr.addColorStop(0,'rgba(255,215,63,0.35)');gr.addColorStop(1,'transparent');c2.beginPath();c2.arc(p.x,p.y,p.s*3.5,0,Math.PI*2);c2.fillStyle=gr;c2.globalAlpha=op*.4;c2.fill();}
    c2.globalAlpha=1;p.y+=p.vy;if(p.y<-5){p.y=cv.height+5;p.x=Math.random()*cv.width;}
  });
  requestAnimationFrame(animPts);
}

// =============================================
// COORDINATE SYSTEM (iOS-safe positioning)
// =============================================
const VBW=375,VBH=420;
function getTransform(){
  const wrap=document.getElementById('scene-wrap');
  const cw=wrap.clientWidth,ch=wrap.clientHeight;
  const scale=Math.max(cw/VBW,ch/VBH);
  return{scale,ox:(cw-VBW*scale)/2,oy:(ch-VBH*scale)/2};
}
function svgToScreen(px,py){
  const{scale,ox,oy}=getTransform();
  return{x:px*scale+ox,y:py*scale+oy};
}

// =============================================
// SCENE BUILDER
// =============================================
function buildScene(lv){
  const wrap=document.getElementById('scene-wrap');
  // Remove old SVG and bubbles
  wrap.querySelectorAll('.scene-svg,.obj-bubble').forEach(e=>e.remove());

  // Insert SVG background
  const parser=new DOMParser();
  const svgStr=`<svg xmlns="http://www.w3.org/2000/svg" class="scene-svg" viewBox="0 0 ${VBW} ${VBH}" preserveAspectRatio="xMidYMid slice">${getSceneSVG(lv.id)}</svg>`;
  const svgDoc=parser.parseFromString(svgStr,'image/svg+xml');
  const svgEl=svgDoc.documentElement;
  wrap.insertBefore(svgEl,document.getElementById('scene-bg-tap'));

  // Create HTML tap targets
  lv.objects.forEach((obj,i)=>{
    if(found.has(obj.id))return;
    const div=document.createElement('div');
    div.className='obj-bubble';
    div.setAttribute('data-id',obj.id);
    div.setAttribute('data-svgx',(obj.cx/100)*VBW);
    div.setAttribute('data-svgy',(obj.cy/100)*VBH);
    div.style.setProperty('--bf-dur',(2.8+i*0.4)+'s');
    div.style.setProperty('--bf-del',(i*0.3)+'s');
    div.textContent=obj.e;

    // iOS touch - must be touchstart with preventDefault
    div.addEventListener('touchstart',function(e){
      e.preventDefault();
      e.stopPropagation();
      if(!found.has(obj.id))doFound(obj.id,div);
    },{passive:false});
    // Mouse/desktop fallback
    div.addEventListener('mousedown',function(e){
      e.preventDefault();
      if(!found.has(obj.id))doFound(obj.id,div);
    });
    wrap.appendChild(div);
  });

  positionBubbles();
}

function positionBubbles(){
  document.querySelectorAll('.obj-bubble').forEach(div=>{
    const sx=parseFloat(div.dataset.svgx);
    const sy=parseFloat(div.dataset.svgy);
    const{x,y}=svgToScreen(sx,sy);
    div.style.left=x+'px';
    div.style.top=y+'px';
  });
}

// =============================================
// GAME LOGIC
// =============================================
function doFound(id,div){
  found.add(id);
  chime([523,659,784]);
  
  // Get center position of div for effects
  const wrap=document.getElementById('scene-wrap');
  const wRect=wrap.getBoundingClientRect();
  const dRect=div.getBoundingClientRect();
  const fx=dRect.left+dRect.width/2-wRect.left;
  const fy=dRect.top+dRect.height/2-wRect.top;

  div.classList.add('found-anim');
  setTimeout(()=>div.remove(),600);

  sparkle(fx,fy,true);
  foundTxt(fx,fy);
  updateTrayItem(id);
  updateDots();
  setTimeout(()=>babyReact(),380);
  setTimeout(()=>{if(found.size>=LEVELS[curLv].objects.length)setTimeout(showComplete,600);},700);
  clearHint();
}

function wrongTap(x,y){
  sfx(300,0.04,0.12);
  const fx=document.getElementById('fx-wrap');
  const el=document.createElement('div');
  el.className='wrong-sp';
  el.style.cssText=`left:${x}px;top:${y}px;position:absolute;`;
  el.textContent='✨';
  fx.appendChild(el);
  setTimeout(()=>el.remove(),750);
  sparkle(x,y,false);
}

function sparkle(x,y,ok){
  const fx=document.getElementById('fx-wrap');
  const div=document.createElement('div');
  const cols=ok?['#FFD23F','#FF8C42','#fff','#3CB54A','#ff6b9d']:['#fff','#ddd'];
  const n=ok?14:5;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='sp';
    const a=(i/n)*Math.PI*2,d=(ok?62:25)+Math.random()*28;
    p.style.cssText=`left:${x}px;top:${y}px;position:absolute;background:${cols[i%cols.length]};width:${ok?7+Math.random()*6:5}px;height:${ok?7+Math.random()*6:5}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${i*.032}s;`;
    div.appendChild(p);
  }
  fx.appendChild(div);setTimeout(()=>div.remove(),950);
}

function foundTxt(x,y){
  const msgs=['MasyaAllah! 🌟','Bagus! ⭐','Yay! 🎉','Keren! ✨','Hebat! 🌙','Alhamdulillah! 💛','Pintar! 🌸'];
  const fx=document.getElementById('fx-wrap');
  const el=document.createElement('div');
  el.className='found-txt';
  el.style.cssText=`left:${x}px;top:${y}px;position:absolute;`;
  el.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  fx.appendChild(el);setTimeout(()=>el.remove(),1500);
}

function babyReact(){
  const wrap=document.getElementById('scene-wrap');
  const rs=['😄','🥰','😁','🌟','💛','🤩','😍'];
  const el=document.createElement('div');
  el.className='baby-react';
  el.textContent=rs[Math.floor(Math.random()*rs.length)];
  wrap.appendChild(el);setTimeout(()=>el.remove(),1050);
}

function updateTrayItem(id){
  const el=document.querySelector(`.ti[data-id="${id}"]`);
  if(el)el.classList.add('found');
  const face=document.getElementById('bmo-face');
  face.classList.add('happy');setTimeout(()=>face.classList.remove('happy'),600);
}

function updateDots(){
  const lv=LEVELS[curLv];
  document.getElementById('g-dots').innerHTML=lv.objects.map(o=>`<div class="gd ${found.has(o.id)?'hit':''}"></div>`).join('');
}

function buildTray(lv){
  document.getElementById('tray-items').innerHTML=lv.objects.map(o=>`<div class="ti ${found.has(o.id)?'found':''}" data-id="${o.id}"><span class="ti-icon">${o.e}</span><span class="ti-lbl">${o.label}</span></div>`).join('');
}

// =============================================
// HINT
// =============================================
function activateHint(){
  if(hintOn)return;
  sfx(900,0.06,0.1);hintOn=true;
  const lv=LEVELS[curLv],unf=lv.objects.filter(o=>!found.has(o.id));
  if(!unf.length)return;
  const t=unf[Math.floor(Math.random()*unf.length)];
  const el=document.querySelector(`.obj-bubble[data-id="${t.id}"]`);
  if(el){el.classList.add('hint');hintTm=setTimeout(clearHint,3500);}
}
function clearHint(){
  hintOn=false;if(hintTm)clearTimeout(hintTm);
  document.querySelectorAll('.obj-bubble.hint').forEach(e=>e.classList.remove('hint'));
}

// =============================================
// COMPLETE
// =============================================
function showComplete(){
  completeSnd();
  const lv=LEVELS[curLv];
  document.getElementById('sticker').textContent=lv.sticker;
  document.getElementById('comp-msg').textContent=lv.msg;
  prog[lv.id]=3;localStorage.setItem('bmo2',JSON.stringify(prog));
  showScreen('complete');
  // burst stars
  setTimeout(()=>{
    const sc=document.getElementById('s-complete');
    const es=['⭐','✨','🌟','💛','🌙','🎉','🌸','🌿'];
    for(let i=0;i<24;i++){setTimeout(()=>{
      const s=document.createElement('div');
      s.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${14+Math.random()*22}px;pointer-events:none;z-index:5;animation:spA 1.2s ease-out forwards;--tx:${(Math.random()-.5)*120}px;--ty:${(Math.random()-.5)*120}px;`;
      s.textContent=es[Math.floor(Math.random()*es.length)];sc.appendChild(s);setTimeout(()=>s.remove(),1300);
    },i*85);}
  },300);
}

// =============================================
// NAVIGATION
// =============================================
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('off'));
  document.getElementById('s-'+name).classList.remove('off');
  if(name==='home')buildMap();
}

function startLevel(idx){
  curLv=idx;found=new Set();hintOn=false;
  const lv=LEVELS[idx];
  document.getElementById('g-title').textContent=lv.name;
  buildScene(lv);buildTray(lv);updateDots();
  showScreen('game');
}

function nextLevel(){
  const n=curLv+1;
  if(n<LEVELS.length)startLevel(n);else showScreen('home');
}

function buildMap(){
  const container=document.getElementById('map-path');
  let html='';
  LEVELS.forEach((lv,i)=>{
    const stars=prog[lv.id]||0;
    const unlocked=i===0||prog[LEVELS[i-1].id]>0;
    const completed=stars>0;
    const isNext=unlocked&&!completed;
    const starHtml=[1,2,3].map(s=>`<span class="${s<=stars?'sf':'se'}">★</span>`).join('');
    let badge='';
    if(!unlocked) badge='<span style="font-size:22px;opacity:.5">🔒</span>';
    else if(isNext) badge='<span class="node-badge play">MAIN ▶</span>';
    else badge='<span class="node-badge done-chk">✅</span>';
    let cls='map-node';
    if(!unlocked) cls+=' locked';
    else if(isNext) cls+=' current';
    else if(completed) cls+=' done';
    html+=`<div class="${cls}" data-idx="${i}">
      <div class="node-icon">${lv.emoji}</div>
      <div class="node-info">
        <div class="node-name">${lv.name}</div>
        <div class="node-desc">${lv.desc}</div>
        <div class="node-stars">${starHtml}</div>
      </div>
      ${badge}
    </div>`;
    if(i<LEVELS.length-1) html+='<div class="map-conn"><div class="map-conn-line"></div></div>';
  });
  container.innerHTML=html;
  container.querySelectorAll('.map-node:not(.locked)').forEach(node=>{
    const doStart=()=>startLevel(parseInt(node.dataset.idx));
    node.addEventListener('touchstart',e=>{e.preventDefault();doStart();},{passive:false});
    node.addEventListener('click',doStart);
  });
  const cur=container.querySelector('.map-node.current');
  if(cur) setTimeout(()=>cur.scrollIntoView({behavior:'smooth',block:'center'}),200);
}

window.addEventListener('load',()=>{
  rCv();pts=Array.from({length:60},mkPt);animPts();
  buildMap();
  window.addEventListener('resize',()=>{rCv();positionBubbles();});

  // Back from game → map
  document.getElementById('game-back').addEventListener('touchstart',e=>{e.preventDefault();showScreen('home');},{passive:false});
  document.getElementById('game-back').addEventListener('click',()=>showScreen('home'));

  // Hint
  document.getElementById('hint-btn').addEventListener('touchstart',e=>{e.preventDefault();activateHint();},{passive:false});
  document.getElementById('hint-btn').addEventListener('click',activateHint);

  // Scene background taps (wrong)
  const bgTap=document.getElementById('scene-bg-tap');
  bgTap.addEventListener('touchstart',function(e){
    if(!e.target.closest('.obj-bubble')){
      const t=e.changedTouches[0];
      const r=this.parentElement.getBoundingClientRect();
      wrongTap(t.clientX-r.left,t.clientY-r.top);
    }
  },{passive:true});
  bgTap.addEventListener('click',function(e){
    if(!e.target.closest('.obj-bubble')){
      const r=this.parentElement.getBoundingClientRect();
      wrongTap(e.clientX-r.left,e.clientY-r.top);
    }
  });

  // Complete buttons
  document.getElementById('btn-next').addEventListener('touchstart',e=>{e.preventDefault();nextLevel();},{passive:false});
  document.getElementById('btn-next').addEventListener('click',nextLevel);
  document.getElementById('btn-menu').addEventListener('touchstart',e=>{e.preventDefault();showScreen('home');},{passive:false});
  document.getElementById('btn-menu').addEventListener('click',()=>showScreen('home'));
});
</script>
