<style>
:root{
  /* Calming bedtime palette — soft twilight indigo/violet, dreamy & cozy */
  --bg:#1A1740;--bg2:#241E54;--bg3:#120F30;
  --card:rgba(255,255,255,.07);--card2:rgba(255,255,255,.10);
  --green:#6E7BF2;--green-lt:#8C96F7;--green-glow:#B3BCFF;
  --gold:#FFD27A;--gold-lt:#FFE3A8;
  --cream:#F3F1FF;--cream-dim:#A7A3D6;
  --teal:#5BD8E8;--purple:#B98CF0;
  --border:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;}
/* Dreamy layered night-sky backdrop */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 45% at 78% 8%, rgba(255,210,122,.16), transparent 60%),
    radial-gradient(ellipse 75% 55% at 18% 12%, rgba(185,140,240,.20), transparent 62%),
    radial-gradient(ellipse 90% 60% at 50% 110%, rgba(110,123,242,.16), transparent 70%),
    linear-gradient(180deg,#241E54 0%,#1A1740 50%,#120F30 100%);}

@keyframes tw{0%,100%{opacity:.06;transform:scale(.7)}50%{opacity:.2;transform:scale(1.3)}}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes su{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pk{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1);opacity:1}}
@keyframes wv{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
@keyframes zf{0%{opacity:.7;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes bt{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes rp{to{transform:scale(5);opacity:0}}
@keyframes mof{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-8px) rotate(1.5deg)}}
@keyframes starFade{0%{opacity:.03}50%{opacity:.18}100%{opacity:.03}}
@keyframes glowBtn{0%,100%{box-shadow:0 10px 30px -6px rgba(110,123,242,.55)}50%{box-shadow:0 12px 44px -6px rgba(185,140,240,.7),0 0 0 10px rgba(140,150,247,.10)}}
@keyframes shadowBreathe{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(.78);opacity:.28}}
@keyframes zzFloat{0%{opacity:.8;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-36px) scale(1.2)}}
@keyframes bonkSway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

.screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);}
.screen.on{display:flex;}

.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px 4px;padding-top:calc(16px + env(safe-area-inset-top));flex-shrink:0;position:relative;z-index:2;}
.ptrack{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green-glow));transition:width .6s;}
.home-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:7px 12px;color:var(--cream-dim);font-size:16px;cursor:pointer;font-family:inherit;transition:.15s;}
.home-btn:active{opacity:.7;}

.shead{text-align:center;padding:10px 24px 0;flex-shrink:0;}
.snum{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--cream-dim);margin-bottom:5px;}
.stitle{font-size:26px;font-weight:900;color:var(--cream);line-height:1.2;}
.shint{font-size:14px;color:var(--cream-dim);margin-top:5px;line-height:1.4;}

.gbtn{
  background:linear-gradient(135deg,var(--green-lt),var(--purple));

  padding:18px 52px;

}
.gbtn:active{transform:scale(.97);}

.pjgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;}
.pjitem{
  background:rgba(255,255,255,.05);
  border:2.5px solid var(--border);
  border-radius:22px;padding:20px 12px;

  position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  touch-action:manipulation;
}
.pjitem:active{transform:scale(.97);}

/* cloth-part highlight glows over Baby Mo (step 2) */
.pjhi{position:absolute;transform:translate(-50%,-50%) scale(.55);border-radius:50%;

  transition:opacity .55s ease, transform .55s cubic-bezier(.34,1.56,.64,1);}
.pjhi.on{opacity:1;transform:translate(-50%,-50%) scale(1);}
.pjhi::after{content:'';position:absolute;inset:0;border-radius:50%;
  box-shadow:0 0 0 1.5px rgba(255,255,255,.2), 0 0 12px 1px currentColor;}

/* Baby Mo's head & shoulders resting on the pillow (step 4) — no circle frame,

.blkhead{width:84px;height:84px;overflow:hidden;position:relative;transition:filter .5s;
  -webkit-mask-image:linear-gradient(180deg,#000 74%,transparent 99%);

.blkhead img{position:absolute;width:205%;height:205%;left:-50%;object-fit:cover;
  transition:top .6s ease, opacity .4s;}

.doa-card{

  border:2px solid var(--border);
  border-radius:18px;
  padding:14px 16px;

}
.dua-ar.active{color:#fff!important;text-shadow:0 0 18px rgba(255,216,116,.9),0 0 6px rgba(255,216,116,.6);}
/* Doa step progress dots */
.ddot{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.08);color:var(--cream-dim);font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.3s;}
.ddot.active{background:linear-gradient(135deg,var(--green-lt),var(--purple));color:#fff;transform:scale(1.18);box-shadow:0 0 12px -2px var(--green);}
.ddot.done{background:rgba(109,184,130,.28);color:var(--green-glow);}
.ddot.ddstar.active{background:linear-gradient(135deg,var(--gold),var(--gold-lt));box-shadow:0 0 12px -2px var(--gold);}
.ddot.ddstar.done{background:rgba(200,144,64,.25);color:var(--gold-lt);}
.ddline{width:16px;height:2px;background:rgba(255,255,255,.12);border-radius:2px;}
.doa-card.now-playing{border-color:var(--gold-lt)!important;background:rgba(255,216,116,.10)!important;box-shadow:0 0 0 1px rgba(255,216,116,.4),0 8px 22px -8px rgba(224,184,77,.4);}
.doa-card.played{border-color:rgba(140,150,247,.45);background:rgba(110,123,242,.08);}
.doa-card.combined{border-color:rgba(200,144,64,.25);background:rgba(200,144,64,.05);}
.doa-card.combined.played{border-color:rgba(200,144,64,.55);background:rgba(200,144,64,.1);}

  border-radius:26px;overflow:hidden;

.blkfold{position:absolute;top:0;left:0;right:0;height:18px;background:linear-gradient(135deg,#7E74E8,#5C52C0);border-radius:2px 2px 0 0;}
.blkgrip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:5px;border-radius:99px;background:rgba(179,188,255,.45);}

.donebanner{text-align:center;padding:12px 24px;flex-shrink:0;animation:su .5s ease;}
.ripel{position:absolute;border-radius:50%;pointer-events:none;animation:rp .6s ease forwards;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}

.mo-logo{object-fit:contain;display:block;filter:drop-shadow(0 6px 18px rgba(0,0,0,.38));animation:mof 3.6s ease-in-out infinite;}
.mo-shadow{border-radius:50%;background:rgba(18,15,48,.45);filter:blur(4px);animation:shadowBreathe 3.6s ease-in-out infinite;margin:0 auto;}
.mo-head{

<script>
/* ── STARS ── */
(function(){
  var c=document.getElementById('stars');
  var glyphs=['✦','·','✧','*','◆'];
  for(var i=0;i<50;i++){
    var s=document.createElement('div');
    var z=.5+Math.random()*2.2;
    s.style.cssText='position:absolute;color:#C89040;font-size:'+z*4+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(0.03+Math.random()*.12)+';animation:starFade '+(2+Math.random()*4)+'s '+(Math.random()*6)+'s infinite ease-in-out;pointer-events:none;';
    s.textContent=glyphs[i%glyphs.length];
    c.appendChild(s);
  }
})();

/* ── UTILS ── */
function vib(p){try{navigator.vibrate&&navigator.vibrate(p||40);}catch(e){}}

/* ── WEB AUDIO ── */
var _audioCtx=null;
function getACtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return _audioCtx;
}

/* Brush bristle sound */
function playBrushSound(){
  var ctx=getACtx();if(!ctx)return;
  try{
    var dur=0.09;
    var bufSize=Math.floor(ctx.sampleRate*dur);
    var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    var data=buf.getChannelData(0);
    for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
    var src=ctx.createBufferSource();src.buffer=buf;
    var bpf=ctx.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=3200;bpf.Q.value=1.2;
    var lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=5500;
    var gain=ctx.createGain();
    gain.gain.setValueAtTime(0.28,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.connect(bpf);bpf.connect(lpf);lpf.connect(gain);gain.connect(ctx.destination);
    src.start(ctx.currentTime);src.stop(ctx.currentTime+dur);
  }catch(e){}
}

/* ── VOICE SYSTEM — Female Indonesian preference ── */
var _vlist=[], _arV=null, _idV=null;
function _initVoices(){
  if(!window.speechSynthesis)return;
  function load(){
    _vlist=speechSynthesis.getVoices();
    _arV=_vlist.find(function(v){return v.lang==='ar-SA';})||
         _vlist.find(function(v){return v.lang==='ar-EG';})||
         _vlist.find(function(v){return v.lang.startsWith('ar');})||null;
    _idV=_vlist.find(function(v){return v.lang==='id-ID'&&(v.name.toLowerCase().includes('female')||v.name.includes('Damayanti')||v.name.includes('Google Bahasa Indonesia'));})
        ||_vlist.find(function(v){return v.lang==='id-ID';})
        ||_vlist.find(function(v){return v.lang.startsWith('id');})||null;
  }
  load();
  if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=load;
}
_initVoices();

function speakMom(txt,cb){
  if(!window.speechSynthesis){if(cb)setTimeout(cb,0);return;}
  var voices=speechSynthesis.getVoices();

/* ── LULLABY ── */
var LUL=(function(){
  var ctx,gain,on=false,tm,ni=0,nt=0;
  var N=[[196,.8],[220,.8],[247,.6],[196,.2],[220,.9],[294,.8],[330,.6],[294,.2],[220,.8],[196,.6],[247,.4],[196,.2],[165,1.4],[0,.5],[196,.7],[220,.7],[247,.5],[294,.7],[330,.9],[294,.6],[247,.6],[220,.6],[196,1.7],[0,.9]];
  function note(f,s,d){
    if(!f||!gain)return;
    var o=ctx.createOscillator(),e=ctx.createGain(),fl=ctx.createBiquadFilter();
    fl.type='lowpass';fl.frequency.value=480;
    o.type='sine';o.frequency.value=f;
    o.connect(fl);fl.connect(e);e.connect(gain);
    e.gain.setValueAtTime(0,s);
    e.gain.linearRampToValueAtTime(.5,s+Math.min(.07,d*.15));
    e.gain.exponentialRampToValueAtTime(.001,s+d-.05);
    o.start(s);o.stop(s+d);
  }
  function tick(){
    while(nt<ctx.currentTime+.7){var n=N[ni%N.length];note(n[0],nt,n[1]);nt+=n[1];ni++;}
    if(on)tm=setTimeout(tick,200);
  }
  return{
    start:function(){
      if(on)return;
      try{
        ctx=new(window.AudioContext||window.webkitAudioContext)();
        gain=ctx.createGain();
        gain.gain.setValueAtTime(0,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(.2,ctx.currentTime+7);
        gain.connect(ctx.destination);
        nt=ctx.currentTime+1.2;ni=0;on=true;tick();
      }catch(e){}
    },
    stop:function(){on=false;clearTimeout(tm);}
  };
})();

function addRipple(el,e,color){
  var r=document.createElement('div');r.className='ripel';

  var x=(e.clientX||rect.left+rect.width/2)-rect.left;
  var y=(e.clientY||rect.top+rect.height/2)-rect.top;
  var sz=Math.max(rect.width,rect.height)*2;
  r.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px;background:'+(color||'rgba(255,255,255,.2)')+';';
  el.appendChild(r);setTimeout(function(){r.remove();},700);
}

function buildBrush(wrap,done){
  var NEED=7,count=0,bx=50,finished=false,pdown=false,refX=0,lastDir=null,moveX=0;
  var FACES=['😐','🙂','😊','😄','🤩','✨','😁'];

  wrap.innerHTML=
    '<div class="shead"><div class="snum">Langkah 1 dari 4</div><div class="stitle">🪥 Gosok Gigi</div><div class="shint">Geser kiri ← → kanan untuk menyikat!</div></div>'
    +'<div style="display:flex;justify-content:center;padding:4px 0 2px;flex-shrink:0;position:relative;">'

    +'<div style="width:150px;height:150px;border-radius:50%;overflow:hidden;position:relative;background:radial-gradient(circle at 50% 42%,rgba(140,150,247,.28),rgba(26,23,64,.3) 60%,transparent 72%);box-shadow:inset 0 0 0 2px rgba(179,188,255,.25);animation:mof 3.6s ease-in-out infinite;"><img src="baby-mo-poses/baby-mo-pose-33.png" alt="Baby Mo" style="position:absolute;width:281%;height:281%;left:-88%;top:-32.5%;object-fit:cover;"/></div>'

    +'<div id="toothGlow" style="position:absolute;bottom:18px;left:45%;transform:translateX(-50%);width:42px;height:9px;background:rgba(62,207,184,0);border-radius:99px;transition:background .4s;"></div>'
    +'</div></div>'
    +'<div style="padding:0 24px;flex-shrink:0;">'
    +'<div style="background:rgba(255,255,255,.07);border-radius:99px;height:8px;overflow:hidden;margin-bottom:5px;"><div id="bprog" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#3ECFB8,#7EE8DC);transition:width .3s;"></div></div>'
    +'<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:800;color:var(--cream-dim);"><span>Mulai</span><span id="bcnt" style="color:#3ECFB8;">0/'+NEED+'</span><span>Bersih ✓</span></div>'

    +'<div style="width:100%;max-width:320px;">'
    +'<div id="bzone" style="position:relative;height:88px;border-radius:22px;background:rgba(255,255,255,.05);border:2px solid var(--border);touch-action:none;cursor:grab;overflow:hidden;">'
    +'<div style="position:absolute;top:50%;left:12px;right:12px;height:2px;background:rgba(255,255,255,.1);border-radius:99px;transform:translateY(-50%);"></div>'
    +'<div id="bfill" style="position:absolute;top:50%;left:12px;width:0%;height:2px;background:linear-gradient(90deg,#3ECFB8,transparent);transform:translateY(-50%);"></div>'
    +'<div id="bbrush" style="position:absolute;top:50%;left:50%;font-size:44px;line-height:1;transform:translateX(-50%) translateY(-50%) rotate(22deg);pointer-events:none;filter:drop-shadow(0 3px 12px rgba(62,207,184,.45));">🪥</div>'
    +'<div id="barrows" style="position:absolute;bottom:7px;left:0;right:0;pointer-events:none;display:flex;justify-content:space-between;padding:0 18px;font-size:22px;color:rgba(255,255,255,.2);animation:pu 1.8s infinite;"><span>←</span><span>→</span></div>'
    +'</div>'
    +'<div id="breact" style="text-align:center;margin-top:9px;font-size:24px;min-height:30px;"></div>'
    +'</div></div>'
    +'<div id="bdone" style="display:none;" class="donebanner"><div style="font-size:40px;">✨😁✨</div><div style="font-size:22px;font-weight:900;color:#3ECFB8;">Gigi bersih &amp; putih!</div></div>';

  function refreshGlow(){
    var p=count/NEED;
    var glow=document.getElementById('toothGlow');
    if(glow)glow.style.background='rgba(62,207,184,'+(p*0.5)+')';
  }

  function addStroke(dir){
    if(dir===lastDir||finished)return;
    lastDir=dir;count=Math.min(count+1,NEED);
    vib(32);
    playBrushSound();
    document.getElementById('bcnt').textContent=count+'/'+NEED;
    document.getElementById('bprog').style.width=(count/NEED*100)+'%';
    document.getElementById('breact').textContent=FACES[Math.min(count,6)];
    refreshGlow();
    if(count>=NEED&&!finished){
      finished=true;vib(100);
      var a=document.getElementById('barrows');if(a)a.style.display='none';
      document.getElementById('breact').textContent='😁 Bersih!';
      document.getElementById('bdone').style.display='block';
      setTimeout(done,1100);
    }
  }

  function updateBrush(){
    var el=document.getElementById('bbrush');var fill=document.getElementById('bfill');
    var bo=document.getElementById('brushOverlay');
    if(!el)return;
    el.style.left=bx+'%';
    var rot=bx>50?-26:26;
    el.style.transform='translateX(-50%) translateY(-50%) rotate('+rot+'deg)';
    if(bo) bo.style.transform='rotate('+(rot+22)+'deg) scale('+(finished?0.8:1)+')';
    if(fill)fill.style.width=Math.max(0,bx-12)/76*100+'%';
  }

  var zone=document.getElementById('bzone');
  zone.addEventListener('pointerdown',function(e){pdown=true;refX=e.clientX;moveX=e.clientX;lastDir=null;zone.setPointerCapture(e.pointerId);});
  zone.addEventListener('pointermove',function(e){
    if(!pdown)return;
    var dx=e.clientX-moveX;moveX=e.clientX;
    bx=Math.max(10,Math.min(90,bx+(dx/zone.clientWidth)*115));
    updateBrush();
    var total=e.clientX-refX;
    if(total>38&&lastDir!=='R'){addStroke('R');lastDir='R';refX=e.clientX;}
    else if(total<-38&&lastDir!=='L'){addStroke('L');lastDir='L';refX=e.clientX;}
  });
  zone.addEventListener('pointerup',function(){pdown=false;if(!finished){bx=50;updateBrush();}});
  zone.addEventListener('pointercancel',function(){pdown=false;if(!finished){bx=50;updateBrush();}});
}

      +'<div id="stageLat" style="font-size:14px;font-weight:700;color:var(--green-glow);font-style:italic;z-index:1;transition:opacity .25s;">'+FULL.lat+'</div>'
      +'<div id="stageMean" style="font-size:12.5px;color:var(--cream-dim);line-height:1.45;z-index:1;transition:opacity .25s;">'+FULL.mean+'</div>'
      +'<div id="doaWave" style="display:none;justify-content:center;align-items:flex-end;height:18px;gap:3px;z-index:1;margin-top:2px;">'+WAVE+'</div>'
      +'</div>'

      /* Play-all */
      +'<button id="playAll" style="flex-shrink:0;width:100%;background:linear-gradient(135deg,var(--green-lt),var(--purple));border:none;border-radius:16px;padding:14px;font-family:inherit;font-size:16px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 8px 24px -6px rgba(110,123,242,.5),inset 0 1px 0 rgba(255,255,255,.3);transition:transform .15s,opacity .2s;">▶ Dengar Semua &amp; Tirukan</button>'

      /* Continue */
      +'<button id="doaLanjut" disabled style="flex-shrink:0;width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-lt));border:none;border-radius:16px;padding:14px;font-family:inherit;font-size:16px;font-weight:900;color:#3A2A10;cursor:pointer;box-shadow:0 8px 24px -6px rgba(200,144,64,.5);opacity:.38;transition:opacity .35s;">Aamiin 🤲 — Lanjut Tidur</button>'

    +'</div>';

  function setStage(s){
    var ar=document.getElementById('stageAr'),lat=document.getElementById('stageLat'),mn=document.getElementById('stageMean');
    if(!ar)return;
    ar.style.opacity='0';lat.style.opacity='0';mn.style.opacity='0';
    setTimeout(function(){
      ar.textContent=s.ar; lat.textContent=s.lat; mn.textContent=s.mean;
      ar.style.opacity='1';lat.style.opacity='1';mn.style.opacity='1';
    },170);
  }
  function dot(i,cls){var d=document.querySelector('.ddot[data-d="'+i+'"]');if(d){d.classList.remove('active','done');if(cls)d.classList.add(cls);}}
  function wave(on){var w=document.getElementById('doaWave');if(w)w.style.display=on?'flex':'none';}
  function arHL(on){var ar=document.getElementById('stageAr');if(ar)ar.classList.toggle('active',on);}

  function speakStep(s,cb){
    playing=true; wave(true); arHL(true);
    var safety=setTimeout(function(){playing=false;wave(false);arHL(false);if(cb)cb();},13000);
    speakMom(s.sId,function(){
      setTimeout(function(){
        speakAr(s.sAr,function(){
          clearTimeout(safety); playing=false; wave(false); arHL(false); if(cb)cb();
        });
      },350);
    });
  }

  function runAll(){
    if(playing)return;
    var pa=document.getElementById('playAll');
    pa.disabled=true; pa.style.opacity='.6'; pa.textContent='▶ Sedang diputar...'; pa.style.animation='';
    function go(i){
      if(i>=STEPS.length){
        doneAll=true;
        pa.disabled=false; pa.style.opacity='1'; pa.textContent='🔁 Dengar Lagi';
        var lj=document.getElementById('doaLanjut');
        if(lj){lj.disabled=false; lj.style.opacity='1'; lj.style.animation='pu 2.2s ease-in-out infinite';}
        return;
      }
      for(var k=0;k<3;k++){ if(k<i) dot(k,'done'); else if(k===i) dot(k,'active'); else dot(k,''); }
      setStage(STEPS[i]);
      setTimeout(function(){
        speakStep(STEPS[i],function(){ dot(i,'done'); setTimeout(function(){go(i+1);},450); });
      },230);
    }
    go(0);
  }
  document.getElementById('playAll').addEventListener('click',runAll);

  document.getElementById('doaLanjut').addEventListener('click',function(){
    if(!doneAll)return;
    speechSynthesis.cancel();
    wrap.innerHTML=
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;">'
      +'<div style="font-size:52px;margin-bottom:12px;animation:fl 2s ease-in-out infinite;">🤲</div>'
      +'<div style="font-size:26px;font-weight:900;color:var(--gold-lt);margin-bottom:8px;">Aamiin ya Rabb...</div>'
      +'<div style="font-family:\'Scheherazade New\',serif;font-size:22px;color:var(--gold);direction:rtl;margin-bottom:10px;">بِاسْمِكَ اللَّهُمَّ أَحْيَا وَبِاسْمِكَ أَمُوتُ</div>'
      +'<div style="font-size:14px;color:var(--cream-dim);line-height:1.6;">Bismika Allāhumma aḥyā wa bismika amūtu<br><span style="font-size:12px;opacity:.7;">Dengan nama-Mu ya Allah aku hidup dan dengan nama-Mu aku mati</span></div>'
      +'<div style="margin-top:16px;font-size:15px;font-weight:800;color:var(--green-glow);">Masya Allah, kamu sudah hafal doanya! 🌟</div>'
      +'</div>';
    vib([60,30,60,30,100]);
    setTimeout(done,2200);
  });
}

/* ══════════════════════════════════════════
   STEP 4 — TARIK SELIMUT
══════════════════════════════════════════ */
function buildBlanket(wrap,done){
  var prog=0,pdown=false,startY=0,startProg=0,finished=false;

  wrap.innerHTML=
    '<div class="shead"><div class="snum">Langkah 4 dari 4</div><div class="stitle" id="blt">🌙 Tarik Selimut</div><div class="shint" id="blh">Seret selimut ke atas untuk tidur!</div></div>'
    +'<div id="dz" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 24px 16px;touch-action:none;cursor:grab;">'
    +'<div class="bedframe">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:22px;background:linear-gradient(90deg,#1A3A28,#243A30);border-radius:24px 24px 0 0;"></div>'
    +'<div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:rgba(0,10,5,.9);"></div>'
    +'<div style="position:absolute;top:22px;left:14px;right:14px;height:88px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:18px;display:flex;align-items:center;justify-content:center;overflow:visible;">'
    +'<div id="blf" class="blkhead"><img id="blfimg" src="baby-mo-poses/baby-mo-pose-12.png" alt="Baby Mo" style="top:-46%;"/></div>'
    +'<div id="zw" style="display:none;position:absolute;right:8px;top:-20px;">'
    +'<span style="font-size:12px;font-weight:900;color:rgba(200,144,64,.4);animation:zf 1.5s 0s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">z</span>'
    +'<span style="font-size:18px;font-weight:900;color:rgba(200,144,64,.5);animation:zf 1.9s .4s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">z</span>'
    +'<span style="font-size:25px;font-weight:900;color:rgba(200,144,64,.55);animation:zf 2.3s .8s ease infinite;display:inline-block;font-family:Nunito,sans-serif;">Z</span>'
    +'</div>'
    +'</div>'
    +'<div id="blo" class="blkout" style="top:88%;">'
    +'<div class="blkbody">'
    +'<div style="position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 10px,transparent 10px,transparent 20px);"></div>'
    +'<div style="position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-evenly;font-size:12px;color:rgba(200,220,180,.15);"><span>★</span><span>✦</span><span>★</span><span>✦</span><span>★</span></div>'
    +'</div>'
    +'<div class="blkfold"><div id="blg" class="blkgrip"></div></div>'
    +'</div>'
    +'</div>'
    +'<div id="bla" style="margin-top:18px;text-align:center;color:var(--green-glow);font-size:13px;font-weight:800;animation:fl 1.8s ease-in-out infinite;pointer-events:none;">'
    +'<div style="font-size:28px;">↑</div><div>Seret ke atas</div>'
    +'</div>'
    +'</div>';

  var asleep=false;  // Baby Mo's eyes: open while awake, closed once snug
  function setEyes(closed){
    if(closed===asleep)return;asleep=closed;
    var im=document.getElementById('blfimg');if(!im)return;
    if(closed){im.src='baby-mo-poses/baby-mo-pose-09.png';im.style.top='-20%';}
    else{im.src='baby-mo-poses/baby-mo-pose-12.png';im.style.top='-46%';}
  }
  function upd(){
    var f=document.getElementById('blf');if(!f)return;
    // past the halfway pull, the blanket is snug → Baby Mo drifts to sleep
    setEyes(finished||prog>.45);
    var b=document.getElementById('blo');
    if(b)b.style.top=(88-prog*72)+'%';
    if(prog>.08){var a=document.getElementById('bla');if(a)a.style.display='none';}
  }

  function finish(){
    if(finished)return;finished=true;vib([80,40,120]);
    var g=document.getElementById('blg');if(g)g.style.display='none';
    var z=document.getElementById('zw');if(z)z.style.display='block';
    var t=document.getElementById('blt');if(t)t.textContent='💤 Selamat Tidur!';
    var h=document.getElementById('blh');if(h)h.textContent='Baby Mo sudah tidur... 🌙';
    setEyes(true);
    var f=document.getElementById('blf');
    if(f)f.style.filter='drop-shadow(0 0 16px rgba(200,144,64,.5))';
    setTimeout(done,1300);
  }

  var dz=document.getElementById('dz');
  dz.addEventListener('pointerdown',function(e){pdown=true;startY=e.clientY;startProg=prog;dz.setPointerCapture(e.pointerId);});
  dz.addEventListener('pointermove',function(e){
    if(!pdown||finished)return;
    var dy=startY-e.clientY;var H=dz.clientHeight||260;
    prog=Math.max(0,Math.min(1,startProg+dy/(H*.58)));
    var b=document.getElementById('blo');if(b)b.style.transition='none';
    upd();if(prog>=1)finish();
  });
  dz.addEventListener('pointerup',function(){
    pdown=false;
    if(!finished&&prog<.38){prog=0;var b=document.getElementById('blo');if(b)b.style.transition='top .4s ease';upd();}
  });
  dz.addEventListener('pointercancel',function(){pdown=false;});
  upd();
}

/* ── SLEEP MODE ── */
function startSleep(){
  LUL.start();
  var viz=document.getElementById('viz');
  [2,3,5,4,7,5,4,3,5,7].forEach(function(h,i){
    var b=document.createElement('div');
    b.style.cssText='width:5px;height:'+(h*3.8)+'px;border-radius:99px;background:rgba(200,144,64,'+(0.15+i*.022)+');animation:wv '+(0.55+i*.13)+'s '+(i*.09)+'s ease-in-out infinite;transform-origin:bottom;';
    viz.appendChild(b);
  });
  setTimeout(function(){document.getElementById('sleepcontent').style.opacity='1';},600);
  var dim=document.getElementById('sleepdim'),d=0;
  var iv=setInterval(function(){d=Math.min(d+.003,.8);dim.style.opacity=d;if(d>=.8)clearInterval(iv);},130);
}
</script>
