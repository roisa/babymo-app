<style>
:root{
  --bg:#07200E; --bg-2:#0C2D17; --bg-3:#103820;
  --green:#18A84E; --green-2:#1FCC5E; --green-soft:#2ED96E; --green-deep:#0E5F2E;
  --gold:#FFB830; --gold-2:#FFCB5C; --gold-deep:#B8801A; --cream:#FFF7E6;
  --ink:#0A1A0F; --ink-soft:#1F3527;
  --paper:#FFFFFF;
  --shadow-1:0 4px 14px rgba(0,0,0,.18);
  --shadow-2:0 18px 40px rgba(0,0,0,.35);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --card-aspect: 1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;width:100%;overflow-x:hidden;
  background: radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg) 55%);
  font-family:'Nunito',system-ui,sans-serif;
  color:var(--cream);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;
}
body{
  display:flex;justify-content:center;
  padding-top:var(--safe-top); padding-bottom:var(--safe-bot);
}
.app{
  width:100%;max-width:440px;min-height:100vh;
  min-height: 100dvh; /* iOS Safari */
  display:flex;flex-direction:column;
  position:relative;
  padding:0 16px 16px;
}
/* Soft starry decorations */
.app::before, .app::after{
  content:'';position:fixed;pointer-events:none;
  width:200px;height:200px;border-radius:50%;
  filter:blur(60px);opacity:.4;z-index:0;
}
.app::before{top:-50px;right:-50px;background:radial-gradient(circle, rgba(255,184,48,.5), transparent 70%)}
.app::after{bottom:-50px;left:-50px;background:radial-gradient(circle, rgba(46,217,110,.45), transparent 70%)}

/* === LAYERED AMBIENT BACKGROUND (calming, multi-layer) === */
.bg-deco{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}
/* Layer A: large drifting blurred glow blobs (ambient color shift) */
.bg-blob{
  position:absolute;border-radius:50%;
  filter: blur(60px);
  mix-blend-mode: screen;
  will-change: transform;
  animation: blobDrift var(--d, 32s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes blobDrift{
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(20px, -25px) scale(1.08); }
  50% { transform: translate(-15px, 20px) scale(0.94); }
  75% { transform: translate(25px, 15px) scale(1.05); }
}
/* Layer B: tiny twinkling dots (starfield texture) */
.bg-twinkle{
  position:absolute;border-radius:50%;
  background: radial-gradient(circle, var(--c, #FFE9C2) 30%, transparent 70%);
  animation: tinyTwinkle var(--d, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  will-change: opacity, transform;
}
@keyframes tinyTwinkle{
  0%, 100% { opacity: 0; transform: scale(0.4); }
  50% { opacity: var(--maxOp, .5); transform: scale(1); }
}
/* Layer C: occasional slow drifting decoration (rare, calmer than before) */
.bg-drift{
  position:absolute;
  color: var(--gold-2);
  filter: drop-shadow(0 0 6px rgba(255,184,48,.3));
  animation: bgFloatUp var(--d, 50s) linear infinite;
  animation-delay: var(--delay, 0s);
  will-change: transform, opacity;
  user-select:none;
}
@keyframes bgFloatUp{
  0%   { transform: translateY(110vh) translateX(0) rotate(0); opacity: 0; }
  10%  { opacity: var(--maxOp, .18); }
  90%  { opacity: var(--maxOp, .18); }
  100% { transform: translateY(-15vh) translateX(var(--drift, 30px)) rotate(180deg); opacity: 0; }
}

/* === HEADER (minimalist: icon-only nav left, ring center, counter + mute right) === */
.header{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:14px 0 10px;position:relative;z-index:2;
}
.head-left, .head-right{display:flex;align-items:center;gap:6px}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:var(--cream);font-size:16px;cursor:pointer;
  display:grid;place-items:center;
  transition:transform .18s, background .18s;
  font-family:inherit;
}
.icon-btn:hover{background:rgba(255,255,255,.12)}
.icon-btn:active{transform:scale(.9)}
.icon-btn.muted{background:rgba(255,80,80,.15);border-color:rgba(255,80,80,.3);color:#ff8080}
.icon-btn.refresh{
  background: rgba(31,204,94,.12);
  border-color: rgba(46,217,110,.3);
  color: #6FE89B;
}
.icon-btn.refresh:hover{background:rgba(31,204,94,.2)}
.icon-btn.refresh:active{
  animation: refreshSpin .55s cubic-bezier(.4,1.4,.5,1);
}
@keyframes refreshSpin{
  from{transform: scale(.9) rotate(0)}
  to{transform: scale(1) rotate(360deg)}
}
.ring-progress{
  position:relative;width:48px;height:48px;
  display:grid;place-items:center;
}
.ring-progress svg{position:absolute;inset:0}
.ring-bg{stroke:rgba(255,184,48,.15)}
.ring-fill{
  stroke:var(--gold);
  transition: stroke-dashoffset .55s cubic-bezier(.4,1.6,.5,1);
  filter: drop-shadow(0 0 6px rgba(255,184,48,.35));
}
.ring-num{
  position:relative;z-index:2;
  font-family:'Fraunces',serif;font-weight:900;font-size:18px;
  color:var(--cream);
  transition: transform .35s cubic-bezier(.4,1.8,.5,1), color .35s;
}
.ring-num.bump{ animation: numBump .55s cubic-bezier(.4,1.8,.5,1) }
@keyframes numBump{
  0%{transform:scale(1)}
  35%{transform:scale(1.55) rotate(-6deg);color:var(--gold)}
  60%{transform:scale(.92) rotate(3deg)}
  100%{transform:scale(1) rotate(0)}
}
.counter-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 13px;border-radius:999px;
  background: linear-gradient(180deg, rgba(255,184,48,.18), rgba(255,184,48,.08));
  border:1.5px solid rgba(255,184,48,.55);
  color:var(--gold-2);font-weight:900;font-size:14px;
  font-family:'Fraunces',serif;letter-spacing:.3px;
  box-shadow: 0 0 15px rgba(255,184,48,.25), inset 0 1px 0 rgba(255,255,255,.1);
  transition: transform .35s cubic-bezier(.4,1.8,.5,1);
}
.counter-pill .star{font-size:13px;font-family:initial;filter:drop-shadow(0 0 6px rgba(255,184,48,.6))}
.counter-pill.bump{ animation: pillBump .55s cubic-bezier(.4,1.8,.5,1) }
@keyframes pillBump{
  0%,100%{transform:scale(1) rotate(0)}
  35%{transform:scale(1.15) rotate(-3deg)}
  60%{transform:scale(.95) rotate(2deg)}
}

/* === TITLE === */
.title-wrap{
  text-align:center;padding:14px 0 18px;position:relative;z-index:2;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-size:11px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;
  color: rgba(255,247,230,.55);
}
.eyebrow::before, .eyebrow::after{
  content:'';display:block;width:24px;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,247,230,.4), transparent);
}
.title{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:34px;line-height:1.05;margin-top:8px;
  color:#FFF;
  letter-spacing:-.5px;
  text-shadow:0 2px 0 rgba(0,0,0,.2);
}
.title .accent{
  color:var(--gold);
  text-shadow: 0 0 20px rgba(255,184,48,.45);
}
.title .emoji{
  display:inline-block;
  animation: titleStar 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 8px rgba(255,184,48,.4));
}
@keyframes titleStar{
  0%,100%{transform: rotate(0) scale(1)}
  50%{transform: rotate(15deg) scale(1.15)}
}
.subtitle{
  font-size:13px;font-weight:600;color:rgba(255,247,230,.55);
  margin-top:8px;letter-spacing:.2px;
}

/* === PUZZLE === */
.puzzle-stage{
  position:relative;z-index:2;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:14px;
  margin-top:8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), var(--shadow-1);
}
.puzzle-frame{
  position:relative;
  width:100%;
  aspect-ratio: var(--card-aspect);
  border-radius:18px;
  overflow:hidden;
  background:#FFF;
  box-shadow: 0 12px 30px rgba(0,0,0,.35), inset 0 0 0 2px rgba(255,184,48,.15);
}
.puzzle-grid{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:0;
}
.tile{
  position:relative;
  perspective:600px;
  cursor:pointer;
}
.tile-inner{
  position:absolute;inset:0;
  transition: transform .6s cubic-bezier(.5,1.6,.4,1);
  transform-style:preserve-3d;
}
.tile.flipped .tile-inner{transform:rotateY(180deg)}
.tile-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
/* tile front: muted color block, emoji centerpiece, drifting micro-sparkles */
.tile-front{
  background: var(--tileBg, linear-gradient(135deg,#3A5840,#2A4030));
  display:grid;place-items:center;
  overflow:hidden;
  isolation:isolate;
}
.tile-front::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,.10), transparent 55%),
    radial-gradient(circle at 80% 85%, rgba(0,0,0,.18), transparent 60%);
  pointer-events:none;
}
/* tiny background star/diamond decorations - random positions per tile */
.tile-front .deco{
  position:absolute;font-size:9px;opacity:.55;
  pointer-events:none;
  animation: decoTwinkle var(--dt,3.5s) ease-in-out infinite var(--dd,0s);
  filter: drop-shadow(0 0 4px rgba(255,220,140,.4));
}
@keyframes decoTwinkle{
  0%,100%{opacity:.25;transform:scale(.9) rotate(0)}
  50%{opacity:.7;transform:scale(1.15) rotate(20deg)}
}
.tile-front .emoji{
  position:relative;z-index:2;
  font-size:36px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,.35));
  animation: emojiFloat var(--ft,2.4s) ease-in-out infinite var(--fd,0s);
  transition: transform .2s;
}
@keyframes emojiFloat{
  0%,100%{transform: translateY(0) rotate(-2deg) scale(1)}
  50%{transform: translateY(-4px) rotate(2deg) scale(1.04)}
}
.tile-front .glow{
  position:absolute;left:50%;top:50%;
  width:60%;aspect-ratio:1;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(255,220,140,.18), transparent 65%);
  pointer-events:none;
  animation: glowPulse var(--gt,3s) ease-in-out infinite var(--gd,0s);
}
@keyframes glowPulse{
  0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(.85)}
  50%{opacity:.9;transform:translate(-50%,-50%) scale(1.1)}
}
.tile.flipped .tile-front .emoji{ animation: emojiPop .45s ease-out forwards }
@keyframes emojiPop{
  0%{transform: scale(1)}
  50%{transform: scale(1.4) rotate(15deg); opacity:.6}
  100%{transform: scale(0); opacity:0}
}
.tile:not(.flipped):active .tile-front .emoji{
  transform: scale(1.18);
  filter: drop-shadow(0 6px 14px rgba(255,220,140,.6)) brightness(1.15);
}
/* stagger entrance when puzzle builds */
.tile{
  animation: tileIn .5s cubic-bezier(.4,1.6,.5,1) both;
  animation-delay: var(--ti, 0s);
}
@keyframes tileIn{
  from{opacity:0;transform:scale(.5) rotate(-8deg)}
  to{opacity:1;transform:scale(1) rotate(0)}
}
.tile-back{
  background-image: var(--bgi);
  background-size: 300% 300%;
  background-position: var(--bgp);
  background-repeat:no-repeat;
  transform: rotateY(180deg);
}
/* Decorative grid lines visible only on front (subtle) */
.puzzle-grid.show-grid::before,
.puzzle-grid.show-grid::after{display:none}

.tile:active:not(.flipped){
  z-index:2;
}

/* sparkle particle */
.sparkle{
  position:absolute;width:14px;height:14px;
  pointer-events:none;
  background:radial-gradient(circle, var(--gold-2) 0%, var(--gold) 50%, transparent 70%);
  border-radius:50%;
  animation: sparkleFly .9s ease-out forwards;
  z-index:5;
}
@keyframes sparkleFly{
  0%{transform: translate(-50%,-50%) scale(.4); opacity:1}
  100%{transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity:0}
}

/* === PRAISE TOAST (mid-puzzle, translucent so tiles stay visible) === */
.praise-toast{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%) scale(0);
  background: rgba(31,204,94,.55);
  backdrop-filter: blur(8px) saturate(140%);
  -webkit-backdrop-filter: blur(8px) saturate(140%);
  color:#FFF;
  padding:11px 20px;border-radius:16px;
  font-family:'Fraunces',serif;font-weight:900;
  font-size:17px;line-height:1.1;text-align:center;
  pointer-events:none;
  z-index:10;
  white-space:nowrap;
  border:1px solid rgba(255,255,255,.22);
  box-shadow: 0 8px 22px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.18);
  text-shadow: 0 1px 3px rgba(0,0,0,.3);
  opacity:0;
}
.praise-toast.show{
  animation: praisePop 1.05s cubic-bezier(.4,1.6,.5,1) forwards;
}
@keyframes praisePop{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg); opacity:0}
  20%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg); opacity:1}
  35%{transform:translate(-50%,-50%) scale(.95) rotate(-1deg); opacity:1}
  50%{transform:translate(-50%,-50%) scale(1) rotate(0); opacity:1}
  85%{transform:translate(-50%,-55%) scale(1) rotate(0); opacity:1}
  100%{transform:translate(-50%,-72%) scale(.85) rotate(0); opacity:0}
}
.praise-toast .star{
  display:inline-block;font-size:18px;margin-right:5px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.25));
  vertical-align:-1px;
}

/* === BOTTOM CHEER TEXT === */
.cheer-text{
  text-align:center;
  margin-top:16px;
  font-family:'Fraunces',serif;font-weight:700;font-size:15px;
  color:rgba(255,247,230,.75);
  letter-spacing:.2px;
  min-height:24px;
  position:relative;z-index:2;
}
.cheer-text.bump{ animation: cheerBump .6s cubic-bezier(.4,1.8,.5,1) }
@keyframes cheerBump{
  0%{transform: translateY(0) scale(1); opacity: .75}
  20%{transform: translateY(-6px) scale(1.06); opacity: 1; color: var(--gold-2)}
  100%{transform: translateY(0) scale(1); opacity: .85}
}

/* === ACTIONS === */
.actions{
  display:flex;justify-content:center;gap:10px;margin-top:14px;
  position:relative;z-index:2;
}
.btn{
  border:none;cursor:pointer;
  padding:13px 22px;border-radius:14px;
  font-family:inherit;font-weight:800;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s, box-shadow .2s;
  border:1px solid rgba(255,255,255,.06);
}
.btn:active{transform:translateY(2px)}
.btn-primary{
  background: linear-gradient(180deg, var(--green-soft), var(--green));
  color:#fff;
  box-shadow: 0 6px 0 #0E5F2E, 0 10px 18px rgba(31,204,94,.3);
}
.btn-primary:active{box-shadow: 0 2px 0 #0E5F2E, 0 4px 8px rgba(31,204,94,.3)}
.btn-secondary{
  background: rgba(255,255,255,.06);
  color:var(--cream);
  border:1px solid rgba(255,255,255,.14);
}
.btn-gold{
  background: linear-gradient(180deg, var(--gold-2), var(--gold));
  color:#3a2400;
  box-shadow: 0 6px 0 #B8801A, 0 10px 18px rgba(255,184,48,.3);
}
.btn-gold:active{box-shadow: 0 2px 0 #B8801A, 0 4px 8px rgba(255,184,48,.3)}
.seen-badge{
  display:inline-block;margin-left:4px;
  background:rgba(255,184,48,.18);color:var(--gold-2);
  padding:1px 7px;border-radius:99px;
  font-family:'Fraunces',serif;font-weight:900;font-size:12px;
  border:1px solid rgba(255,184,48,.3);
}

/* === BOTTOM TRUST STRIP (pinned to viewport bottom, monochrome muted) === */
.trust{
  margin-top:auto;
  padding:14px 4px 0;
  text-align:center;
  font-size:10px;font-weight:600;
  color:rgba(255,247,230,.28);
  letter-spacing:.5px;
  display:flex;flex-wrap:wrap;justify-content:center;gap:4px 12px;
  position:relative;z-index:2;
  /* Make all emoji icons monochrome-grey to match text */
}
.trust span{display:inline-flex;align-items:center;gap:4px}
.trust .ico{
  display:inline-block;
  filter: grayscale(1) brightness(1.6) opacity(.55);
  font-size:10px;
}

/* === CELEBRATION OVERLAY (cropped character + animated theme emoji) === */
.celebration{
  position:fixed;inset:0;z-index:50;
  background:
    radial-gradient(ellipse at top, rgba(31,204,94,.12), transparent 50%),
    radial-gradient(ellipse at bottom, rgba(255,184,48,.08), transparent 50%),
    linear-gradient(180deg, var(--bg-3) 0%, var(--bg) 70%);
  backdrop-filter: blur(18px);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:calc(var(--safe-top) + 18px) 16px calc(var(--safe-bot) + 18px);
  opacity:0;visibility:hidden;
  transition: opacity .4s, visibility .4s;
  overflow-y:auto;
}
.celebration.show{opacity:1;visibility:visible}
.celeb-close{
  position:absolute;top: calc(var(--safe-top) + 14px); right: 16px;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.08);color:var(--cream);
  border:1px solid rgba(255,255,255,.14);
  font-size:16px;cursor:pointer;
  display:grid;place-items:center;z-index:5;
}
.celeb-banner{
  margin-top:12px;
  font-family:'Fraunces',serif;font-weight:900;font-size:13px;
  background:linear-gradient(180deg, var(--gold-2), var(--gold));
  color:#3a2400;
  padding:7px 16px;border-radius:999px;
  box-shadow: 0 4px 0 var(--gold-deep), 0 8px 16px rgba(255,184,48,.3);
  letter-spacing:.6px;text-transform:uppercase;
  transform: scale(0);
  animation: bannerIn .55s cubic-bezier(.4,1.8,.5,1) .25s forwards;
}
@keyframes bannerIn{
  0%{transform:scale(0) rotate(-15deg); opacity:0}
  60%{transform:scale(1.15) rotate(5deg); opacity:1}
  100%{transform:scale(1) rotate(0); opacity:1}
}
.celeb-stage{
  position:relative;
  width:100%;max-width:420px;
  height: clamp(260px, 40vh, 360px);
  display:flex;align-items:center;justify-content:center;
  margin: 8px 0 0;
}
.celeb-character-wrap{
  position:relative;
  height:100%;
  display:flex;align-items:flex-end;justify-content:center;
  transform: translateY(120px) scale(.3) rotate(-15deg);
  opacity:0;
  animation: charPop .9s cubic-bezier(.34, 1.56, .54, 1.05) .25s forwards;
}
@keyframes charPop{
  0%{   transform: translateY(120px) scale(.3) rotate(-15deg); opacity: 0; }
  45%{  transform: translateY(-20px) scale(1.18) rotate(8deg); opacity: 1; }
  62%{  transform: translateY(8px) scale(.92) rotate(-4deg); }
  78%{  transform: translateY(-3px) scale(1.04) rotate(2deg); }

.celeb-character{

/* THEME EMOJI - animated to match phrase meaning */
.theme-emoji{
  position:absolute;

}
@keyframes themeEmojiIn{

  to{transform: scale(1) rotate(0); opacity:1}

/* default position varies, override per-anim where needed */
.theme-emoji.pos-tr{ top:6%; right:8%; }
.theme-emoji.pos-tl{ top:8%; left:6%; }
.theme-emoji.pos-mr{ top:38%; right:4%; }

.theme-emoji.anim-wave{
  transform-origin: 70% 80%;
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             waveShake 1.2s ease-in-out 1.2s infinite;
}
@keyframes waveShake{
  0%,100%{transform: rotate(0)}
  20%{transform: rotate(22deg)}
  60%{transform: rotate(-18deg)}
  80%{transform: rotate(10deg)}
}
.theme-emoji.anim-pulse{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             tePulse 1.5s ease-in-out 1.2s infinite;
}
@keyframes tePulse{
  0%,100%{transform: scale(1)}
  50%{transform: scale(1.18)}
}
.theme-emoji.anim-rotate{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teRotate 7s linear 1.2s infinite;
}
@keyframes teRotate{ from{transform: rotate(0)} to{transform: rotate(360deg)} }
.theme-emoji.anim-twinkle{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teTwinkle 1.6s ease-in-out 1.2s infinite;
}
@keyframes teTwinkle{
  0%,100%{transform: scale(1) rotate(0); opacity: 1}
  35%{transform: scale(1.25) rotate(20deg); opacity: .85}
  60%{transform: scale(.92) rotate(-12deg); opacity: 1}
}
.theme-emoji.anim-bounce{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teBounce 1.1s ease-in-out 1.2s infinite;
}
@keyframes teBounce{
  0%,100%{transform: translateY(0)}
  40%{transform: translateY(-14px)}
}
.theme-emoji.anim-pulseGlow{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             tePulseGlow 1.8s ease-in-out 1.2s infinite;
}
@keyframes tePulseGlow{
  0%,100%{transform: scale(1); filter: drop-shadow(0 6px 12px rgba(0,0,0,.45)) drop-shadow(0 0 0 rgba(255,184,48,0))}
  50%{transform: scale(1.14); filter: drop-shadow(0 6px 12px rgba(0,0,0,.45)) drop-shadow(0 0 22px rgba(255,184,48,.7))}
}
.theme-emoji.anim-heartbeat{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teHeart 1.1s ease-in-out 1.2s infinite;
}
@keyframes teHeart{
  0%,40%,100%{transform: scale(1)}
  10%{transform: scale(1.22)}
  20%{transform: scale(1.05)}
  30%{transform: scale(1.18)}
}
.theme-emoji.anim-float{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teFloat 2.6s ease-in-out 1.2s infinite;
}
@keyframes teFloat{
  0%,100%{transform: translateY(0)}
  50%{transform: translateY(-12px)}
}
.theme-emoji.anim-bobFly{
  animation: themeEmojiIn .6s cubic-bezier(.4,1.6,.5,1) .55s forwards,
             teBobFly 2.6s ease-in-out 1.2s infinite;
}
@keyframes teBobFly{
  0%,100%{transform: translate(0,0) rotate(-6deg)}

}

.modal{

function pickN(arr, n){
  const copy = [...arr];
  const out = [];
  for (let i=0; i<n && copy.length; i++){
    out.push(copy.splice(Math.floor(Math.random()*copy.length), 1)[0]);
  }
  return out;
}

/* === AUDIO MANAGER ===
 *  Architecture: try MP3 → fall back to browser TTS.
 *
 *  Why TTS sounds the way it does:
 *  Browser TTS has NO child-Arabic voice anywhere. The closest we can get is:
 *    1) feed actual Arabic SCRIPT (not romanization) — Arabic voices read it correctly
 *    2) pick the best available Arabic voice on the device automatically
 *    3) raise pitch to suggest a younger speaker
 *  For a real 5-10yo Arabic-boy voice, drop MP3 files in /audio/ next to this HTML.
 *  Recommended sources: record a child reciter, or hire a voice artist on Fiverr/Voices.com.
 *  Filenames must match phrase.mp3 paths (audio/01-assalamualaikum.mp3, etc.).
 */
const audio = {
  el: null,
  synth: window.speechSynthesis || null,
  voicesReady: false,
  ensureCtx(){
    if (!state.audioCtx){
      try { state.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
      catch(e){}
    }
    return state.audioCtx;
  },
  ensureVoices(){
    if (!this.synth) return Promise.resolve();
    if (this.voicesReady) return Promise.resolve();
    return new Promise((resolve) => {
      const v = this.synth.getVoices();
      if (v && v.length){ this.voicesReady = true; resolve(); return; }
      const handler = () => { this.voicesReady = true; resolve(); };
      this.synth.addEventListener('voiceschanged', handler, { once: true });
      setTimeout(() => { this.voicesReady = true; resolve(); }, 1200);
    });
  },
  pickArabicVoice(){
    if (!this.synth) return null;
    const voices = this.synth.getVoices();
    if (!voices.length) return null;
    const arabic = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('ar'));
    if (!arabic.length) return null;
    // Preferred voices ranked by quality/clarity for kids
    // iOS: Maged (Saudi), Tarik (Algerian), Laila (Levantine female - pleasant pitch)
    // Edge/Win: Hoda (Egyptian female), Naayf (Saudi)
    // Google: ar-XA wavenet voices
    const preferred = ['Laila','Hoda','Maged','Naayf','Tarik','Salim','Amira'];
    for (const name of preferred){
      const v = arabic.find(x => x.name && x.name.includes(name));
      if (v) return v;
    }
    // Otherwise prefer female voices (typically higher pitch → sounds younger)
    const female = arabic.find(v => /female|woman|laila|hoda|amira|salma/i.test(v.name));
    return female || arabic[0];
  },
  stopAll(){
    if (this.synth) this.synth.cancel();
    if (this.el){ try{ this.el.pause(); this.el.currentTime=0; }catch(e){} }
  },
  /** Magical chime tap: layered fundamental + octave harmonic (sounds like glass/bell). */
  playTone(freq=440, dur=0.22, type='sine', vol=0.16){
    if (state.muted) return;
    const ctx = this.ensureCtx(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    const t0 = ctx.currentTime;
    const make = (f, v, d, ty='sine') => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = ty; o.frequency.value = f;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(v, t0+0.008);
      g.gain.exponentialRampToValueAtTime(0.0008, t0+d);
      o.start(t0); o.stop(t0+d+0.02);
    };
    make(freq, vol, dur, type);             // fundamental
    make(freq*2, vol*0.45, dur*0.7, 'sine'); // octave harmonic (chime feel)
    make(freq*3, vol*0.18, dur*0.4, 'sine'); // bright shimmer top
  },
  /** Magic twinkle (3-note ascending arpeggio) for special moments. */
  playTwinkle(baseFreq=523.25){
    if (state.muted) return;
    const ctx = this.ensureCtx(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    const intervals = [1, 1.5, 2]; // octave + fifth
    intervals.forEach((m, i) => {
      setTimeout(() => this.playTone(baseFreq*m, 0.18, 'sine', 0.13 - i*0.02), i*55);
    });
  },
  /** Bright "ding!" for praise toast. */
  playDing(){
    if (state.muted) return;
    const ctx = this.ensureCtx(); if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    // Cheerful major triad cluster with quick decay
    this.playTone(1318.51, 0.32, 'sine', 0.12);  // E6
    setTimeout(() => this.playTone(1567.98, 0.28, 'sine', 0.10), 30); // G6
    setTimeout(() => this.playTone(2093.00, 0.22, 'sine', 0.08), 60); // C7
  },
  /** Play phrase audio: try MP3 first, fall back to TTS in Arabic script. */
  async playPhrase(phrase){
    if (state.muted || !phrase) return;
    this.stopAll();
    // 1) Try recorded MP3 first (best quality - real child voice)
    if (phrase.mp3){
      try {
        const a = new Audio(phrase.mp3);
        a.preload = 'auto';
        const ok = await new Promise((resolve) => {
          a.addEventListener('canplay', () => resolve(true), { once: true });
          a.addEventListener('error', () => resolve(false), { once: true });
          setTimeout(() => resolve(false), 800);
          a.load();
        });
        if (ok){ this.el = a; await a.play(); return; }
      } catch(e) { /* fall through */ }
    }
    // 2) Fallback: browser TTS using Arabic SCRIPT (correct pronunciation)
    if (this.synth && phrase.arabic){
      await this.ensureVoices();
      const u = new SpeechSynthesisUtterance(phrase.arabic);
      u.lang = 'ar-SA';
      u.rate = 0.88;     // slightly under normal — clearer for kids
      u.pitch = 1.45;    // higher → suggests younger speaker
      u.volume = 1;
      const v = this.pickArabicVoice();
      if (v) u.voice = v;
      this.synth.speak(u);
    }
  },
  /** Celebration "ta-da" using tones. */
  playFanfare(){
    if (state.muted) return;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C E G C
    notes.forEach((f,i)=>setTimeout(()=>this.playTone(f, .28, 'triangle', .20), i*120));
  },
};

function setMuted(m){

/* === SMART SHUFFLE (unseen first) === */
function pickPhrase(){
  // Avoid showing same phrase as last time when possible
  const last = localStorage.getItem(STORE.CURRENT);
  const unseen = PHRASES.filter(p => !state.seen.has(p.id) && p.id !== last);
  let pool;
  if (unseen.length > 0) pool = unseen;
  else {
    // All seen: pick from pool excluding last
    const others = PHRASES.filter(p => p.id !== last);
    pool = others.length ? others : PHRASES;
  }
  const choice = pool[Math.floor(Math.random()*pool.length)];
  localStorage.setItem(STORE.CURRENT, choice.id);
  return choice;
}

/* === RENDER PUZZLE === */
function buildPuzzle(phrase){
  state.current = phrase;
  state.tilesOpened = 0;
  state.done = false;
  // reset progress UI
  updateProgressUI(0);
  document.getElementById('cheerText').textContent = CHEERS[0];
  document.getElementById('coachMark').style.display = 'flex';

  // Apply per-phrase contextual prompt
  document.getElementById('promptEyebrow').textContent = phrase.promptEyebrow || 'Kalimat Thayyibah';
  document.getElementById('promptTitle').innerHTML =
    (phrase.promptTitle || 'Siapa <span class="accent">aku</span>?') + ' <span class="emoji">🌟</span>';
  document.getElementById('promptSub').textContent = phrase.promptSub || 'Ketuk petak untuk membuka rahasia!';

  // Pick 9 random emojis
  const emojis = pickN(TILE_EMOJIS, 9);
  const grid = document.getElementById('puzzleGrid');
  grid.innerHTML = '';

  for (let r=0; r<3; r++){
    for (let c=0; c<3; c++){
      const idx = r*3 + c;
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.r = r; tile.dataset.c = c;
      // Stagger entrance
      tile.style.setProperty('--ti', (idx * 0.045) + 's');

      const inner = document.createElement('div'); inner.className='tile-inner';

      // FRONT: emoji centerpiece + scattered decorations + soft glow
      const front = document.createElement('div'); front.className='tile-face tile-front';
      const bg = TILE_BGS[Math.floor(Math.random()*TILE_BGS.length)];
      front.style.setProperty('--tileBg', bg);
      // Glow with random pulse timing
      const glow = document.createElement('div'); glow.className='glow';
      glow.style.setProperty('--gt', rand(2.5, 4.2).toFixed(2)+'s');
      glow.style.setProperty('--gd', rand(0, 1.5).toFixed(2)+'s');
      front.appendChild(glow);
      // 2-3 scatter decorations per tile at random positions
      const decoCount = 2 + Math.floor(Math.random()*2);
      for (let i=0; i<decoCount; i++){
        const d = document.createElement('span'); d.className='deco';
        d.textContent = TILE_DECOS[Math.floor(Math.random()*TILE_DECOS.length)];
        d.style.left = (10 + Math.random()*80) + '%';
        d.style.top = (10 + Math.random()*80) + '%';
        d.style.fontSize = (8 + Math.random()*6) + 'px';
        d.style.setProperty('--dt', rand(2.4, 4.5).toFixed(2)+'s');
        d.style.setProperty('--dd', rand(0, 2).toFixed(2)+'s');
        front.appendChild(d);
      }
      // Emoji centerpiece with random float timing
      const em = document.createElement('span'); em.className='emoji';
      em.textContent = emojis[idx];
      em.style.setProperty('--ft', rand(2.0, 3.4).toFixed(2)+'s');
      em.style.setProperty('--fd', rand(0, 1.5).toFixed(2)+'s');
      front.appendChild(em);

      // BACK: image piece (3x3 background sprite)
      const back = document.createElement('div'); back.className='tile-face tile-back';
      const x = (c/2)*100; // 0%, 50%, 100%
      const y = (r/2)*100;
      back.style.backgroundImage = `url("${phrase.image}")`;
      back.style.backgroundPosition = `${x}% ${y}%`;

      inner.appendChild(front); inner.appendChild(back);
      tile.appendChild(inner);
      tile.addEventListener('click', () => onTileClick(tile));
      grid.appendChild(tile);
    }
  }
}

function onTileClick(tile){
  if (state.done || tile.classList.contains('flipped')) return;
  document.getElementById('coachMark').style.display = 'none';
  tile.classList.add('flipped');
  state.tilesOpened++;
  updateProgressUI(state.tilesOpened);

  // Sparkle particles
  spawnSparkles(tile, 5);
  // Magical chime that ascends as more tiles open
  const scale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33];
  const noteIdx = Math.min(state.tilesOpened - 1, scale.length - 1);
  audio.playTwinkle(scale[noteIdx]);

  // Haptic on supported devices
  if (navigator.vibrate) navigator.vibrate(12);

  // Show praise toast (skip on the final tap — celebration takes over)
  if (state.tilesOpened < 9){
    showPraise();
  }

  if (state.tilesOpened >= 9){
    state.done = true;
    setTimeout(showCelebration, 550);
  }
}

/* === PROGRESS / CHEER UI === */
function updateProgressUI(n){
  // Ring progress (SVG dashoffset)
  const ring = document.getElementById('ringFill');
  const pct = n / 9;
  ring.style.strokeDashoffset = (RING_CIRC * (1 - pct)).toFixed(2);
  // Numeric in ring center
  const ringNum = document.getElementById('ringNum');
  ringNum.textContent = n;
  ringNum.classList.remove('bump'); void ringNum.offsetWidth; ringNum.classList.add('bump');
  // Counter pill
  document.getElementById('tilesOpenedNum').textContent = n;
  const pill = document.getElementById('counterPill');
  pill.classList.remove('bump'); void pill.offsetWidth; pill.classList.add('bump');
  // Cheer text
  const cheer = document.getElementById('cheerText');
  cheer.textContent = CHEERS[n] || CHEERS[CHEERS.length - 1];
  cheer.classList.remove('bump'); void cheer.offsetWidth; cheer.classList.add('bump');
}

/* === PRAISE TOAST === */
let praiseLast = -1;
function showPraise(){
  // Pick a praise that's different from last shown
  let i;
  do { i = Math.floor(Math.random() * PRAISES.length); } while (i === praiseLast && PRAISES.length > 1);
  praiseLast = i;
  const p = PRAISES[i];
  const t = document.getElementById('praiseToast');
  t.innerHTML = `<span class="star">${p.star}</span>${p.text}`;
  t.classList.remove('show');
  void t.offsetWidth; // restart animation
  t.classList.add('show');
  audio.playDing();
}

function spawnSparkles(tile, count){
  const rect = tile.getBoundingClientRect();
  const frame = document.getElementById('puzzleFrame').getBoundingClientRect();
  for (let i=0; i<count; i++){
    const s = document.createElement('div');
    s.className='sparkle';
    const cx = rect.left - frame.left + rect.width/2;
    const cy = rect.top - frame.top + rect.height/2;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    const angle = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*40;
    s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    document.getElementById('puzzleFrame').appendChild(s);
    setTimeout(()=>s.remove(), 1000);
  }
}

/* === CELEBRATION === */
function showCelebration(){
  const p = state.current;
  // Mark seen + increment play count
  state.seen.add(p.id);
  saveSeen();
  state.plays[p.id] = (state.plays[p.id] || 0) + 1;
  localStorage.setItem(STORE.PLAYS, JSON.stringify(state.plays));
  document.getElementById('seenCount').textContent = state.seen.size;

  // Fill celebration: cropped character + theme emoji + text
  const charImg = document.getElementById('celebCharImg');
  charImg.src = p.character || p.image;
  charImg.alt = p.title;
  const themeEmoji = document.getElementById('themeEmoji');
  themeEmoji.textContent = p.themeEmoji || '✨';
  // reset animation classes then apply this phrase's anim
  themeEmoji.className = 'theme-emoji pos-tr anim-' + (p.themeAnim || 'pulse');
  // restart animations by reflow
  void themeEmoji.offsetWidth;

  document.getElementById('celebNum').textContent = p.num;
  document.getElementById('celebTitle').textContent = p.title;
  document.getElementById('celebArabic').textContent = p.arabic;
  document.getElementById('celebIndo').textContent = p.indo;

  document.getElementById('celebration').classList.add('show');
  audio.playFanfare();
  spawnConfetti(40);
  // Play voice after short delay (so fanfare doesn't overlap)
  setTimeout(() => audio.playPhrase(p), 700);
}

function hideCelebration(){
  document.getElementById('celebration').classList.remove('show');
  audio.stopAll();
}

function spawnConfetti(n){
  const colors = ['#FFB830','#1FCC5E','#FF6B6B','#FFD166','#06D6A0','#118AB2','#FFFFFF'];
  for (let i=0; i<n; i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = (Math.random()*100) + '%';
    c.style.setProperty('--c', colors[Math.floor(Math.random()*colors.length)]);
    c.style.setProperty('--xEnd', (Math.random()*200-100) + 'px');
    c.style.setProperty('--d', (2 + Math.random()*1.5) + 's');
    c.style.setProperty('--delay', (Math.random()*.4) + 's');
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 4500);
  }
}

/* === COLLECTION === */
function openCollection(){
  const grid = document.getElementById('collectionGrid');
  grid.innerHTML = '';
  PHRASES.forEach(p => {
    const it = document.createElement('div');
    const unlocked = state.seen.has(p.id);
    const plays = state.plays[p.id] || 0;
    it.className = 'coll-item ' + (unlocked ? 'unlocked' : 'locked');
    // Build play-count dots (max 5 visible, then "+N" badge)
    const maxDots = 5;
    let playsHtml = '';
    if (unlocked){
      const filled = Math.min(plays, maxDots);
      const dotsArr = [];
      for (let i = 0; i < maxDots; i++){
        dotsArr.push(`<span class="dot${i < filled ? ' filled' : ''}"></span>`);
      }
      const more = plays > maxDots ? `<span class="more">+${plays - maxDots}</span>` : '';
      playsHtml = `<div class="coll-plays">${dotsArr.join('')}${more}</div>`;
    }
    it.innerHTML = `
      <div class="coll-img" style="background-image:url('${p.image}')"></div>
      <span class="coll-num">${p.num}</span>
      <div class="coll-lock">🔒</div>
      ${playsHtml}
      ${unlocked ? `<div class="coll-name">${p.title}</div>` : ''}
    `;
    if (unlocked) {
      it.addEventListener('click', () => {
        audio.playPhrase(p);
        if (navigator.vibrate) navigator.vibrate(10);
      });
    }
    grid.appendChild(it);
  });
  document.getElementById('collSeenCount').textContent = state.seen.size;
  document.getElementById('collBarFill').style.width = (state.seen.size/PHRASES.length*100) + '%';
  document.getElementById('collectionModal').classList.add('show');
}
function closeCollection(){
  document.getElementById('collectionModal').classList.remove('show');
}

/* === EVENT WIRING === */
function startNew(){
  hideCelebration();
  closeCollection();
  // small delay so overlay fade-out is smooth
  setTimeout(() => {
    const p = pickPhrase();
    buildPuzzle(p);
  }, 280);
}
document.getElementById('newPuzzleBtn').addEventListener('click', startNew);
document.getElementById('celebNewBtn').addEventListener('click', startNew);
document.getElementById('celebCloseBtn').addEventListener('click', hideCelebration);
document.getElementById('replayBtn').addEventListener('click', () => audio.playPhrase(state.current));
document.getElementById('celebCollBtn').addEventListener('click', () => {
  hideCelebration();
  setTimeout(openCollection, 280);
});
document.getElementById('collectionBtn').addEventListener('click', openCollection);
document.getElementById('modalCloseBtn').addEventListener('click', closeCollection);
document.getElementById('collectionModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('collectionModal')) closeCollection();
});
document.getElementById('muteBtn').addEventListener('click', () => {
  audio.ensureCtx();
  setMuted(!state.muted);
});
// Game Hub: parent app should override this. Default tries history back.
document.getElementById('hubBtn').addEventListener('click', () => {
  if (window.parent !== window){ window.parent.postMessage({type:'babymo:exit'}, '*'); }
  else if (history.length > 1){ history.back(); }
});

// Prevent accidental double-tap zoom on iOS
let lastTouch = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouch <= 350) e.preventDefault();
  lastTouch = now;
}, { passive: false });

/* === INIT === */
function init(){
  document.getElementById('seenCount').textContent = state.seen.size;
  setMuted(state.muted);
  spawnBgDecorations();
  const p = pickPhrase();
  buildPuzzle(p);
}
init();

// Unlock audio on first user gesture (iOS Safari requirement)
document.addEventListener('click', () => audio.ensureCtx(), { once: true });
</script>
